<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choice | UStore</title>
  <meta property="og:title" content="Choice">
  <meta property="og:description" content="Google Play 등록 준비 중인 모바일 앱">
  <meta property="og:url" content="https://utobit.net/ustore/choice/">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: #fff; color: #111827;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .topbar { padding: 16px 28px; border-bottom: 1px solid #f3f4f6; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.8125rem; font-weight: 600;
      color: #6b7280; text-decoration: none; transition: color .15s;
    }
    .back-btn:hover { color: #111827; }
    .back-btn svg { width: 16px; height: 16px; }
    .hero {
      max-width: 640px; margin: 0 auto;
      padding: 72px 28px 56px; text-align: center;
    }
    .app-icon {
      width: 96px; height: 96px; border-radius: 22px;
      margin: 0 auto 28px; display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,.12); object-fit: cover;
    }
    .app-name {
      font-size: 2.25rem; font-weight: 900;
      letter-spacing: -.04em; color: #111827; margin-bottom: 12px;
    }
    .app-tagline {
      font-size: 1rem; color: #6b7280;
      margin-bottom: 36px; line-height: 1.8;
    }
    .status-badge {
      display: inline-block;
      padding: 10px 28px; border-radius: 12px;
      font-size: 0.9375rem; font-weight: 700;
      background: #f3f4f6; color: #9ca3af;
    }
    footer {
      border-top: 1px solid #f3f4f6; padding: 24px 28px;
      text-align: center; font-size: 0.78rem; color: #9ca3af;
    }
    footer a { color: #9ca3af; text-decoration: none; }
    footer a:hover { color: #6b7280; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/ustore/" class="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 4L6 8l4 4"/>
    </svg>
    UStore
  </a>
</div>

<section class="hero">
  <img class="app-icon" src="../../assets/choice_icon.png" alt="Choice">
  <h1 class="app-name">Choice</h1>
  <p class="app-tagline">Mobile · App<br>Google Play 등록 준비 중</p>
  <span class="status-badge">준비 중</span>
</section>

<footer>
  <p>Choice © 2026 Utobit · <a href="mailto:clus0109@gmail.com">clus0109@gmail.com</a></p>
</footer>

</body>
</html>
