<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DallaePCAgent</title>
  <meta property="og:title" content="DallaePCAgent">
  <meta property="og:description" content="모바일 연동 PC프로그램. Claude API 기반 개인용 Agent">
  <meta property="og:url" content="https://utobit.net/ustore/da/">
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff; --bg-soft: #f9fafb; --bg-soft2: #f3f4f6;
      --border: #e5e7eb; --border-strip: #f3f4f6;
      --text: #111827; --text-secondary: #374151;
      --text-muted: #6b7280; --text-dim: #9ca3af;
      --btn-dark-bg: #111827; --btn-dark-text: #fff;
    }
    [data-theme="dark"] {
      --bg: #0d1117; --bg-soft: #161b22; --bg-soft2: #21262d;
      --border: #21262d; --border-strip: #161b22;
      --text: #f0f6fc; --text-secondary: #c9d1d9;
      --text-muted: #8b949e; --text-dim: #6e7681;
      --btn-dark-bg: #f0f6fc; --btn-dark-text: #0d1117;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background .2s, color .2s;
    }

    /* BACK NAV */
    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border-strip);
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.8125rem; font-weight: 600;
      color: var(--text-muted); text-decoration: none;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }
    .back-btn svg { width: 16px; height: 16px; }

    /* HERO */
    .hero {
      max-width: 640px;
      margin: 0 auto;
      padding: 72px 28px 56px;
      text-align: center;
    }
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 22px;
      margin: 0 auto 28px;
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      object-fit: cover;
    }
    .app-name {
      font-size: 2.25rem;
      font-weight: 900;
      letter-spacing: -.04em;
      color: var(--text);
      margin-bottom: 12px;
    }
    .app-tagline {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.8;
    }
    .dl-row {
      display: flex; gap: 12px;
      justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      border-radius: 12px;
      font-size: 0.9375rem; font-weight: 700;
      text-decoration: none; border: none;
      cursor: pointer; font-family: inherit;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: var(--btn-dark-bg); color: var(--btn-dark-text); }
    .btn-outline { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn svg { width: 18px; height: 18px; }

    /* SCREENSHOTS */
    .screenshots {
      padding: 0 28px 80px;
      max-width: 900px;
      margin: 0 auto;
    }
    .screenshot-frame {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      width: 100%;
    }
    .screenshot-frame img {
      width: 100%;
      height: auto;
      display: block;
    }
    .screenshot-spacer {
      height: 200px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border-strip);
      padding: 24px 28px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--text-muted); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 4L6 8l4 4"/>
    </svg>
    UStore
  </a>
</div>

<section class="hero">
  <img class="app-icon" src="../../assets/dallae_icon.png" alt="DallaePCAgent">
  <h1 class="app-name">DallaePCAgent</h1>
  <p class="app-tagline">모바일 연동 PC프로그램.<br>Claude API 기반 개인용 Agent<br>데모 배포 예정</p>
  <div class="dl-row">
    <button class="btn btn-primary" onclick="dlPc()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      PC 다운로드
    </button>
    <button class="btn btn-outline" onclick="dlApk()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1"/>
      </svg>
      Android APK
    </button>
  </div>
</section>


<footer>
  <p>DallaePCAgent © 2026 Utobit · <a href="mailto:clus0109@gmail.com">clus0109@gmail.com</a></p>
</footer>

<script>
  const PC_URL  = "https://github.com/Utobit/dallae-baepo-releases/raw/main/DallaePC.zip";
  const APK_URL = "https://github.com/Utobit/dallae-baepo-releases/raw/main/DallaePC.apk";
  function dlPc()  { window.location.href = PC_URL; }
  function dlApk() { window.location.href = APK_URL; }
</script>

<script>
function toggleTheme(){var d=document.documentElement,n=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',n);localStorage.setItem('theme',n);}
</script>
</body>
</html>
