<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utobit — PC·모바일 앱 스토어 · UStore</title>
  <meta name="description" content="Utobit에서 다양한 PC·모바일 앱을 만나보세요. UStore에서 무료 유틸리티 프로그램을 다운로드하세요.">
  <link rel="canonical" href="https://utobit.net/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://utobit.net/">
  <meta property="og:title" content="Utobit — PC·모바일 앱 스토어">
  <meta property="og:description" content="Utobit에서 다양한 PC·모바일 앱을 만나보세요. UStore에서 무료 유틸리티 프로그램을 다운로드하세요.">
  <meta property="og:image" content="https://utobit.net/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F93QE1MMT8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F93QE1MMT8');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff;
      --bg-soft: #f9fafb;
      --bg-card: #fff;
      --border: #e5e7eb;
      --border-hover: #d1d5db;
      --border-strip: #f3f4f6;
      --text: #111827;
      --text-secondary: #374151;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --nav-bg: rgba(255,255,255,.9);
      --shadow-hover: rgba(0,0,0,.07);
      --btn-dark-bg: #111827;
      --btn-dark-text: #fff;
      --btn-beta-bg: #fef3c7;
      --btn-beta-text: #92400e;
      --btn-soon-bg: #f3f4f6;
      --btn-soon-text: #9ca3af;
      --toggle-bg: #f3f4f6;
      --toggle-color: #6b7280;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-soft: #161b22;
      --bg-card: #161b22;
      --border: #21262d;
      --border-hover: #30363d;
      --border-strip: #161b22;
      --text: #f0f6fc;
      --text-secondary: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --nav-bg: rgba(13,17,23,.92);
      --shadow-hover: rgba(0,0,0,.35);
      --btn-dark-bg: #f0f6fc;
      --btn-dark-text: #0d1117;
      --btn-beta-bg: #3b2800;
      --btn-beta-text: #f59e0b;
      --btn-soon-bg: #21262d;
      --btn-soon-text: #6e7681;
      --toggle-bg: #21262d;
      --toggle-color: #c9d1d9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      transition: background .2s, color .2s;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-strip);
      height: 60px;
      display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1080px;
      margin: 0 auto; padding: 0 28px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .nav-right { display: flex; gap: 20px; align-items: center; }
    .nav-link {
      font-size: 0.875rem; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      transition: color .15s;
      cursor: pointer; background: none; border: none; font-family: inherit;
    }
    .nav-link:hover { color: var(--text); }
    .nav-logo {
      font-size: 1rem; font-weight: 900;
      color: var(--text); text-decoration: none;
      letter-spacing: -.03em;
    }
    .nav-ustore {
      font-size: 0.8125rem; font-weight: 800;
      color: var(--text); letter-spacing: -.01em;
    }
    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--toggle-bg);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--toggle-color);
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--border-hover); }

    /* ── MAIN LAYOUT ── */
    main { max-width: 1080px; margin: 0 auto; padding: 56px 28px 0; }

    .section-label {
      font-size: 0.6875rem; font-weight: 700;
      color: var(--text-secondary); letter-spacing: .14em;
      text-transform: uppercase;
    }

    /* ── SEARCH ── */
    .search-wrap {
      width: 100%; max-width: 400px;
      margin: 0 auto 28px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 18px;
      border: 1px solid var(--border); border-radius: 12px;
      font-size: 0.875rem; font-family: inherit;
      background: var(--bg-soft); color: var(--text);
      outline: none; transition: border-color .15s, background .2s;
    }
    .search-wrap input:focus { border-color: var(--text-muted); background: var(--bg-card); }
    .search-wrap input::placeholder { color: var(--text-dim); }

    /* ── APP CARDS ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 64px;
    }
    .app-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      background: var(--bg-card);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      transition: box-shadow .2s, border-color .2s, background .2s;
    }
    .app-card:hover {
      box-shadow: 0 4px 20px var(--shadow-hover);
      border-color: var(--border-hover);
    }
    .app-icon {
      width: 52px; height: 52px;
      border-radius: 13px;
      object-fit: cover;
      margin-bottom: 16px;
      display: block;
    }
    .app-icon-placeholder {
      width: 52px; height: 52px; border-radius: 13px;
      background: var(--bg-soft); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-name-row {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 4px;
    }
    .app-name {
      font-size: 1rem; font-weight: 800;
      color: var(--text); letter-spacing: -.02em;
    }
    .app-cat {
      font-size: 0.6875rem; font-weight: 700;
      color: var(--text-dim); letter-spacing: .08em;
      text-transform: uppercase;
    }
    .app-tagline {
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .app-desc {
      font-size: 0.78rem; color: var(--text-muted);
      line-height: 1.6; flex: 1;
      margin-bottom: 18px;
    }
    .app-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-version { font-size: 0.72rem; color: var(--text-dim); }
    .app-btn {
      font-size: 0.78rem; font-weight: 600;
      padding: 6px 14px; border-radius: 8px;
    }
    .app-btn-dark { background: var(--btn-dark-bg); color: var(--btn-dark-text); }
    .app-btn-beta { background: var(--btn-beta-bg); color: var(--btn-beta-text); }
    .app-btn-soon { background: var(--btn-soon-bg); color: var(--btn-soon-text); }

    .app-grid-empty {
      grid-column: 1/-1;
      text-align: center; padding: 60px 0;
      color: var(--text-dim); font-size: 0.875rem;
    }

    /* ── SERVICES STRIP ── */
    .services-strip {
      border-top: 1px solid var(--border-strip);
      padding: 40px 0 72px;
    }
    .services-strip .section-label { margin-bottom: 20px; }
    .services-row {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .svc-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      background: var(--bg-card);
      text-decoration: none; color: inherit;
      display: flex; align-items: center; gap: 14px;
      flex: 1; min-width: 220px;
      transition: box-shadow .2s, border-color .2s, background .2s;
    }
    .svc-card:hover {
      box-shadow: 0 4px 16px var(--shadow-hover);
      border-color: var(--border-hover);
    }
    .svc-icon {
      width: 44px; height: 44px; border-radius: 11px;
      object-fit: cover; flex-shrink: 0;
    }
    .svc-icon-box {
      width: 44px; height: 44px; border-radius: 11px;
      background: var(--bg-soft); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .svc-name {
      font-size: 0.9375rem; font-weight: 700;
      color: var(--text); letter-spacing: -.02em;
    }
    .svc-desc {
      font-size: 0.75rem; color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border-strip);
      padding: 36px 28px;
      max-width: 1080px; margin: 0 auto;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .footer-copy { font-size: 0.78rem; color: var(--text-dim); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-size: 0.78rem; color: var(--text-muted);
      text-decoration: none; transition: color .15s;
    }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 700px) {
      .app-grid { grid-template-columns: 1fr; }
      .nav-link.hide-mobile { display: none; }
      .nav-logo { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Utobit — PC·모바일 앱 스토어, UStore</h1>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">UTOBIT</a>
    <div class="nav-right">
      <span class="nav-ustore">UStore</span>
      <a href="studio/" class="nav-link hide-mobile">Studio</a>
      <a href="agents/" class="nav-link hide-mobile">Agent</a>
      <a href="information/" class="nav-link">Information</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="다크모드 전환">
        <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

<main>

  <!-- Search -->
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="앱 검색..." oninput="filterApps()">
  </div>

  <div id="app-grid" class="app-grid">
    <p class="app-grid-empty">앱 목록을 불러오는 중...</p>
  </div>

  <!-- Other Services -->
  <div class="services-strip">
    <p class="section-label">Also from Utobit</p>
    <div class="services-row" style="margin-top:20px;">

      <a href="ustore/da/" class="svc-card">
        <img class="svc-icon" src="assets/dallae_icon.png" alt="DallaePCAgent">
        <div>
          <p class="svc-name">DallaePCAgent</p>
          <p class="svc-desc">모바일-PC 연동 개인 AI Agent</p>
        </div>
      </a>

      <a href="ms/pg/" class="svc-card">
        <div class="svc-icon-box">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div>
          <p class="svc-name">Project Glyph</p>
          <p class="svc-desc">마나무한 스튜디오 — 수집형 RPG 개발 중</p>
        </div>
      </a>

    </div>
  </div>

</main>

<footer>
  <span class="footer-copy">© 2026 Utobit &nbsp;·&nbsp; 문의 : clus0109@gmail.com</span>
  <nav class="footer-links">
    <a href="privacy/">개인정보처리방침</a>
    <a href="information/">회사 소개</a>
  </nav>
</footer>

<script>
let allApps = [];

fetch('/ustore/apps.json')
  .then(r => r.json())
  .then(data => { allApps = data.apps; renderApps(allApps); })
  .catch(() => {
    document.getElementById('app-grid').innerHTML = '<p class="app-grid-empty">앱 목록을 불러오지 못했습니다.</p>';
  });

function filterApps() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = q
    ? allApps.filter(a => a.name.toLowerCase().includes(q) || a.description.toLowerCase().includes(q) || (a.tagline||'').toLowerCase().includes(q))
    : allApps;
  renderApps(filtered);
}

function renderApps(apps) {
  const grid = document.getElementById('app-grid');

  const icon = app => app.icon
    ? `<img class="app-icon" src="${app.icon}" alt="${app.name}">`
    : `<div class="app-icon-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg></div>`;

  const catLabel = app => app.category === 'mobile' ? 'Mobile' : app.category === 'pc' ? 'PC' : 'Asset';

  const btn = app => {
    if (app.status === 'available') return `<span class="app-btn app-btn-dark">상세보기</span>`;
    if (app.status === 'beta')      return `<span class="app-btn app-btn-beta">베타</span>`;
    return `<span class="app-btn app-btn-soon">출시 예정</span>`;
  };

  if (!apps.length) {
    grid.innerHTML = '<p class="app-grid-empty">검색 결과가 없습니다.</p>';
    return;
  }

  grid.innerHTML = apps.map(app => `
    <a href="${app.detail_url}" class="app-card" onclick="gtag('event','app_click',{app_slug:'${app.slug}',app_name:'${app.name}'})">
      ${icon(app)}
      <div class="app-name-row">
        <span class="app-name">${app.name}</span>
        <span class="app-cat">· ${catLabel(app)}</span>
      </div>
      ${app.tagline ? `<p class="app-tagline">${app.tagline}</p>` : ''}
      <p class="app-desc">${app.description}</p>
      <div class="app-footer">
        <span class="app-version">${app.version ? `v${app.version}` : ''}</span>
        ${btn(app)}
      </div>
    </a>
  `).join('');
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  const isDark = (theme || document.documentElement.getAttribute('data-theme')) === 'dark';
  document.getElementById('iconSun').style.display = isDark ? 'block' : 'none';
  document.getElementById('iconMoon').style.display = isDark ? 'none' : 'block';
}

updateThemeIcon();
</script>
</body>
</html>
