<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choice — 투표방 이동 중</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fff; color: #333; }
    p { font-size: 16px; color: #666; }
    a { color: #6C63FF; text-decoration: none; font-weight: bold; }
  </style>
  <script>
    (function () {
      var parts = window.location.pathname.split('/room/');
      var roomId = parts.length > 1 ? parts[1].replace(/\/$/, '') : '';
      var storeLink = 'https://play.google.com/store/apps/details?id=com.manamuhan.choice.app';
      if (roomId) {
        window.location.href = 'choice://room/' + roomId;
        setTimeout(function () { window.location.href = storeLink; }, 2000);
      } else {
        window.location.href = storeLink;
      }
    })();
  </script>
</head>
<body>
  <p>Choice 앱으로 이동 중... (앱이 없으면 스토어로 연결됩니다)</p>
  <p><a href="https://play.google.com/store/apps/details?id=com.manamuhan.choice.app">앱 설치하기</a></p>
</body>
</html>
