<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio — Utobit</title>
  <meta name="description" content="Utobit 산하 스튜디오.">
  <link rel="canonical" href="https://utobit.net/studio/">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F93QE1MMT8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F93QE1MMT8');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: #fff; color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #f3f4f6;
      height: 60px; display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1080px;
      margin: 0 auto; padding: 0 28px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .nav-right { display: flex; gap: 20px; align-items: center; }
    .nav-link {
      font-size: 0.875rem; font-weight: 500;
      color: #374151; text-decoration: none;
      transition: color .15s;
    }
    .nav-link:hover { color: #111827; }
    .nav-link.active { color: #111827; font-weight: 700; }
    .nav-logo {
      font-size: 1rem; font-weight: 900;
      color: #111827; text-decoration: none;
      letter-spacing: -.03em;
    }

    main {
      max-width: 1080px; margin: 0 auto;
      padding: 56px 28px 80px;
    }

    .page-label {
      font-size: 0.6875rem; font-weight: 700;
      color: #374151; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 28px;
    }

    .studio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .studio-card {
      border: 1px solid #e5e7eb; border-radius: 16px;
      padding: 24px; text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      transition: box-shadow .2s, border-color .2s;
    }
    .studio-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
      border-color: #d1d5db;
    }
    .studio-icon-box {
      width: 52px; height: 52px; border-radius: 13px;
      background: #f3f4f6; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .studio-name-row {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 8px;
    }
    .studio-name {
      font-size: 1rem; font-weight: 800;
      color: #111827; letter-spacing: -.02em;
    }
    .studio-cat {
      font-size: 0.6875rem; font-weight: 700;
      color: #9ca3af; letter-spacing: .08em;
      text-transform: uppercase;
    }
    .studio-desc {
      font-size: 0.78rem; color: #6b7280;
      line-height: 1.6; flex: 1; margin-bottom: 18px;
    }
    .studio-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .studio-status { font-size: 0.72rem; color: #9ca3af; }
    .studio-btn {
      font-size: 0.78rem; font-weight: 600;
      padding: 6px 14px; border-radius: 8px;
      background: #111827; color: #fff;
    }

    .studio-slot {
      border: 1px dashed #e5e7eb; border-radius: 16px;
      padding: 24px;
      display: flex; align-items: center; justify-content: center;
      min-height: 160px;
      color: #d1d5db;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: .06em;
    }

    footer {
      border-top: 1px solid #f3f4f6;
      padding: 36px 28px;
      max-width: 1080px; margin: 0 auto;
      display: flex; justify-content: space-between;
      align-items: center;
    }
    .footer-copy { font-size: 0.78rem; color: #9ca3af; }

    @media (max-width: 700px) {
      .studio-grid { grid-template-columns: 1fr; }
      .nav-logo { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">UTOBIT</a>
    <div class="nav-right">
      <a href="/" class="nav-link">UStore</a>
      <a href="." class="nav-link active">Studio</a>
      <a href="../agents/" class="nav-link">Agent</a>
    </div>
  </div>
</nav>

<main>
  <p class="page-label">Studio</p>

  <div class="studio-grid">

    <a href="/ms/pg/" class="studio-card">
      <div class="studio-icon-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <div class="studio-name-row">
        <span class="studio-name">Manamuhan Studio</span>
        <span class="studio-cat">· Game</span>
      </div>
      <p class="studio-desc">수집형 RPG — Project Glyph 개발 중.</p>
      <div class="studio-footer">
        <span class="studio-status">개발 중</span>
        <span class="studio-btn">보기</span>
      </div>
    </a>

    <div class="studio-slot">준비 중</div>
    <div class="studio-slot">준비 중</div>

  </div>
</main>

<footer>
  <span class="footer-copy">© 2026 Utobit</span>
</footer>

</body>
</html>
