<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Utobit</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", sans-serif;
      background: #fff; color: #111827;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .code { font-size: 0.72rem; font-weight: 700; color: #9ca3af; letter-spacing: 0.18em; margin-bottom: 16px; }
    h1 { font-size: 1.75rem; font-weight: 800; color: #111827; margin-bottom: 10px; }
    p { font-size: 0.875rem; color: #6b7280; margin-bottom: 36px; }
    a {
      display: inline-block; padding: 10px 24px;
      background: #2563eb; color: #fff;
      font-weight: 700; border-radius: 8px;
      text-decoration: none; font-size: 0.875rem;
      transition: opacity .15s;
    }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <p class="code">404</p>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 없거나 이동되었습니다.</p>
  <a href="/">홈으로 돌아가기</a>
</body>
</html>
