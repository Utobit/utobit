<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manamuhan Studio</title>
  <meta name="description" content="마나무한 스튜디오 — Project Glyph 개발 중.">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F93QE1MMT8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F93QE1MMT8');
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+KR:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: #fff;
      overflow: hidden;
    }

    a.stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100vh;
      text-decoration: none;
      color: #111827;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    /* 배경 격자 애니메이션 */
    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(#e5e7eb 1px, transparent 1px),
        linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0;
      animation: fadeGrid 1.2s ease-out 0.3s forwards;
    }
    @keyframes fadeGrid {
      to { opacity: 1; }
    }

    /* 중앙 블러 글로우 */
    .glow {
      position: absolute;
      width: min(70vw, 600px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.12) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }

    /* 텍스트 */
    .content {
      position: relative; z-index: 10;
      text-align: center;
    }

    .studio-sub {
      font-size: clamp(0.7rem, 1.2vw, 0.875rem);
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 24px;
      opacity: 0;
      animation: slideUp 0.9s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }

    .studio-name {
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 900;
      letter-spacing: -.05em;
      line-height: .9;
      color: #111827;
      opacity: 0;
      animation: slideUp 0.9s cubic-bezier(.22,1,.36,1) 0.35s forwards;
      position: relative;
    }
    /* 텍스트 마스크 라인 효과 */
    .studio-name::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #2563eb, transparent);
      transform: scaleX(0);
      animation: lineReveal 1s cubic-bezier(.22,1,.36,1) 0.9s forwards;
    }
    @keyframes lineReveal {
      to { transform: scaleX(1); }
    }

    .enter-hint {
      margin-top: 48px;
      font-size: 0.8125rem; font-weight: 600;
      color: #9ca3af;
      letter-spacing: .06em;
      opacity: 0;
      animation: slideUp 0.9s cubic-bezier(.22,1,.36,1) 0.6s forwards;
      transition: color .2s;
    }
    a.stage:hover .enter-hint { color: #2563eb; }

    /* hover 시 배경 틴트 */
    a.stage::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(37,99,235,.02);
      opacity: 0;
      transition: opacity .3s;
    }
    a.stage:hover::before { opacity: 1; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(24px); }
    }
    @keyframes fadeGridOut {
      to { opacity: 0; }
    }
    .stage-out .studio-sub {
      animation: slideDown 0.35s cubic-bezier(.55,0,.1,1) 0s forwards !important;
    }
    .stage-out .studio-name {
      animation: slideDown 0.35s cubic-bezier(.55,0,.1,1) 0.05s forwards !important;
    }
    .stage-out .enter-hint {
      animation: slideDown 0.35s cubic-bezier(.55,0,.1,1) 0.1s forwards !important;
    }
    .stage-out .grid-bg {
      animation: fadeGridOut 0.38s ease-in forwards !important;
    }
    .stage-out .glow {
      transition: opacity 0.38s ease !important;
      opacity: 0 !important;
      animation: none !important;
    }
  </style>
</head>
<body>
  <a href="pg/" class="stage">
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="content">
      <p class="studio-sub">Game Studio</p>
      <h1 class="studio-name">MANAMUHAN<br>STUDIO</h1>
      <p class="enter-hint">Project Glyph →</p>
    </div>
  </a>
<script>
  document.querySelector('a.stage').addEventListener('click', function(e) {
    e.preventDefault();
    var href = this.getAttribute('href');
    this.classList.add('stage-out');
    setTimeout(function() { window.location.href = href; }, 400);
  });
</script>
</body>
</html>
